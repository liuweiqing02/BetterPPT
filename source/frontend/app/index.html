<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetterPPT 控制台</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <script>
    // Keep local static hosting compatible: route to root app with hash-based /app/*.
    const route = window.location.pathname.replace(/\/app\/index\.html$/, '/app/create').replace(/\/app\/$/, '/app/create');
    window.location.replace(`../index.html#${route}`);
  </script>
</body>
</html>
